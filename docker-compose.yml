services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: flowforge-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowforge
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge -d flowforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  reverb:
    image: flowforge-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  queue:
    image: flowforge-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "php artisan queue:work --queue=high,default & php artisan queue:work --queue=high,default & php artisan queue:work --queue=high,default & wait"
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  scheduler:
    image: flowforge-app
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  vite:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    command: npm run dev -- --host=0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html

volumes:
  postgres-data:
  redis-data:
